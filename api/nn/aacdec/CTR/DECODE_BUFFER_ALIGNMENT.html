    <title>DECODE_BUFFER_ALIGNMENT</title>
  </head>
  <body>
    <h1><a href="../../../nn/Overview.html">nn</a>::<a href="../../../nn/aacdec/Overview.html">aacdec</a>::<a href="../../../nn/aacdec/CTR/Overview.html">CTR</a>::DECODE_BUFFER_ALIGNMENT Constant</h1>
    <h2>Syntax</h2>
    <div class="section">
      <pre class="definition">
static const <a href="../../../nn_types/s32.html">s32</a> DECODE_BUFFER_ALIGNMENT =  32;</pre>
    </div>
    <h2>Description</h2>
    <div class="section">
      <p>The address of the buffer specified in <code><a href="../../../nn/aacdec/CTR/Decode.html">Decode</a></code> must be aligned to the number of bytes specified by this function. It is defined as 32 bytes.</p>
    </div>
