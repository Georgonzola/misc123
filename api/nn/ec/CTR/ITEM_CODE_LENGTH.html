    <title>ITEM_CODE_LENGTH</title>
  </head>
  <body>
    <h1><a href="../../../nn/Overview.html">nn</a>::<a href="../../../nn/ec/Overview.html">ec</a>::<a href="../../../nn/ec/CTR/Overview.html">CTR</a>::ITEM_CODE_LENGTH Constant</h1>
    <h2>Syntax</h2>
    <div class="section">
      <pre class="definition">
const size_t ITEM_CODE_LENGTH =  32;</pre>
    </div>
    <h2>Description</h2>
    <div class="section">
      <p>The length of a <code>NULL</code>-terminated UTF-8 string that identifies that service item's item. In actual practice, it works out to be 16 characters plus the <code>NULL</code> terminator.</p>
    </div>
