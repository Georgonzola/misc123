    <h1><a href="../../../nn/Overview.html">nn</a>::<a href="../../../nn/jpeg/Overview.html">jpeg</a>::<a href="../../../nn/jpeg/CTR/Overview.html">CTR</a>::MP_ENTRY_SIZE Constant</h1>
    <h2>Syntax</h2>
    <div class="section">
      <pre class="definition">
const size_t MP_ENTRY_SIZE =  16;</pre>
    </div>
    <h2>Description</h2>
    <div class="section">
      <p>This constant represents the number of bytes in one element of an MP-format MP entry. This is not the number of bytes in the <code><a href="../../../nn/jpeg/CTR/MpEntry/Overview.html">MpEntry</a></code> structure.</p><!-- write here --></div>
