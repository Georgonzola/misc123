    <h1><a href="../../nn/Overview.html">nn</a>::<a href="../../nn/math/Overview.html">math</a>::MTX23IsIdentity Function</h1>
    <h2>Syntax</h2>
    <div class="section">
      <pre class="definition">
NN_MATH_INLINE bool MTX23IsIdentity(
     const <a href="../../nn/math/MTX23/Overview.html">MTX23</a> * p
);
</pre>
    </div>
    <h2>Parameters</h2>
    <div class="section">
      <table class="arguments">
        <thead>
          <tr>
            <td width="15" />
            <th>Name</th>
            <td>Description</td>
          </tr>
        </thead>
        <tr>
          <td>in</td>
          <th>p</th>
          <td>Matrix to evaluate.</td>
        </tr> </table>
    </div>
    <h2>Return Values</h2>
    <div class="section">Returns <code>true</code> if p is an identity matrix. </div>
    <h2>Description</h2>
    <div class="section">
      <p>Determines whether a matrix is an identity matrix.</p>
    </div>
