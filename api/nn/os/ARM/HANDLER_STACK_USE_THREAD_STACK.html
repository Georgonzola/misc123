    <h1><a href="../../../nn/Overview.html">nn</a>::<a href="../../../nn/os/Overview.html">os</a>::<a href="../../../nn/os/ARM/Overview.html">ARM</a>::HANDLER_STACK_USE_THREAD_STACK Constant</h1>
    <h2>Syntax</h2>
    <div class="section">
      <pre class="definition">
const <a href="../../../nn_types/uptr.html">uptr</a> HANDLER_STACK_USE_THREAD_STACK =  1;</pre>
    </div>
    <h2>Description</h2>
    <div class="section">
      <p>Specifies that the stack of the thread in which the exception occurred be used as the exception handler stack.</p><!-- write here --></div>
