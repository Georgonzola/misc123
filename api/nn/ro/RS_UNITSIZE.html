    <title>RS_UNITSIZE</title>
  </head>
  <body>
    <h1><a href="../../nn/Overview.html">nn</a>::<a href="../../nn/ro/Overview.html">ro</a>::RS_UNITSIZE Constant</h1>
    <h2>Syntax</h2>
    <div class="section">
      <pre class="definition">
static const <a href="../../nn_types/s32.html">s32</a> RS_UNITSIZE =  4096;</pre>
    </div>
    <h2>Description</h2>
    <div class="section">
      <p>Specifies the number of bytes that the size of the <code>crs</code> specified in <code><a href="../../nn/ro/Initialize.html">Initialize</a></code> must be a multiple of. It is defined as 4096 bytes.</p>
    </div>
