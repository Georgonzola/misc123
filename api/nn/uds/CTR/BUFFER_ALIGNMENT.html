  <body>
    <h1><a href="../../../nn/Overview.html">nn</a>::<a href="../../../nn/uds/Overview.html">uds</a>::<a href="../../../nn/uds/CTR/Overview.html">CTR</a>::BUFFER_ALIGNMENT Constant</h1>
    <h2>Syntax</h2>
    <div class="section">
      <pre class="definition">
static const <a href="../../../nn_types/s32.html">s32</a> BUFFER_ALIGNMENT =  4096;</pre>
    </div>
    <h2>Description</h2>
    <div class="section">
      <p>Specifies the number of bytes that the address of the received buffer specified in <code><a href="../../../nn/uds/CTR/Initialize.html">Initialize</a></code> must be aligned to. It is defined as 4096 bytes.</p><!-- write here --></div>
