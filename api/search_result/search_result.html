function FormatLength(n, len)
{
    var str = "" + n;
    while( str.length < len )
    {
        str = " " + str;
    }
    return str;
}

function SetResult(msg, link)
{
    if( link )
    {
        document.getElementById("resultMessage").innerHTML = "";
        document.getElementById("resultLink")   .innerHTML = msg;
        document.getElementById("resultLink")   .href      = link;
    }
    else
    {
        document.getElementById("resultMessage").innerHTML = msg;
        document.getElementById("resultLink")   .innerHTML = "";
        document.getElementById("resultLink")   .href      = "";
    }
}

function OnTextChanged_Result()
{
    var v = document.getElementById("codeValue").value;

    var v2 = v.replace(/[^0-9xa-f]/gi,"");
    var v3 = v2.replace(/0x/i, "");

    if( v3.length < 8 )
    {
        var d = 8 - v3.length;
        document.getElementById("remainMessage").innerHTML = "(Another " + d + " digits)";
    }
    else if( v3.length > 8 )
    {
        var od = v3.length - 8;
        document.getElementById("remainMessage").innerHTML = "( " + od + " digits over)";
    }
    else
    {
        document.getElementById("remainMessage").innerHTML = "";
    }
    if( v3.length != 8 )
    {
        document.getElementById("resultUnknown").style.display = "none";
        SetResult("(None)");
        return;
    }

    v3 = v3.toLowerCase();
    var result = parseInt(v3, 16);

    var r_module  = ((result >> 10) & 0xFF);
    if ( r_module == s_ModuleFs )
    {
        // FS is range Result
        var r_description = ((result >> 0) & 0x3FF);
        var link = null;
        for ( var i in s_LinkFs )
        {
            // If Description is settled in a range
            if ( r_description >= s_LinkFs[i]["min"] && r_description <= s_LinkFs[i]["max"] )
            {
                var fsResult = parseInt(i, 16);
                if ( (result & 0xFFFFFC00) == (fsResult & 0xFFFFFC00) )
                {
                    // When a range repeats, a range gives priority to minimum one
                    if ( link === null || s_LinkFs[i]["max"] - s_LinkFs[i]["min"] < s_LinkFs[link]["max"] - s_LinkFs[link]["min"] )
                    {
                        link = i;
                    }
                }
            }
        }

        if ( link !== null )
        {
            document.getElementById("resultUnknown").style.display = "none";
            SetResult(s_LinkFs[link]["name"], s_LinkFs[link]["addr"]);
            return;
        }
    }

    if( s_Link[v3] )
    {
        document.getElementById("resultUnknown").style.display = "none";
        SetResult(s_Link[v3]["name"], s_Link[v3]["addr"]);
    }
    else
    {
        // Calculate each element
        var r_level   = ((result >> 27) & 0x1F);
        var r_summary = ((result >> 21) & 0x3F);

        r_level = (r_level > 15) ? r_level - 32: r_level;

        var levelText   = FormatLength(r_level, 3)   + "  ";
        var summaryText = FormatLength(r_summary, 3) + "  ";
        var moduleText  = FormatLength(r_module, 3)  + "  ";

        levelText   += (s_Level[r_level]     ? s_Level[r_level]:     "(unknown)");
        summaryText += (s_Summary[r_summary] ? s_Summary[r_summary]: "(unknown)");
        moduleText  += (s_Module[r_module]   ? s_Module[r_module]:   "(unknown)");

        SetResult("Not applicable");
        document.getElementById("resultLevel")  .innerHTML = levelText;
        document.getElementById("resultSummary").innerHTML = summaryText;
        document.getElementById("resultModule") .innerHTML = moduleText;

        document.getElementById("resultUnknown").style.display = "block";
    }
}

/* +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++ */



function CallMember(obj, member)
{
    return function()
    {
        return member.apply(obj, arguments);
    };
}

function CallWithParam(func, params)
{
    return function()
    {
        return func.apply(window, params);
    };
}

function RegisterEventHandler(obj, type, listener, handler, useCapture)
{
    if( ! listener.eventHandlerHelpers )
    {
        listener.eventHandlerHelpers = new Array();
    }

    var id = "" + type + handler + useCapture;
    var helper = listener.eventHandlerHelpers[id];

    if( obj.addEventListener )
    {
        if( ! helper )
        {
            helper = new function(obj, cb)
                {
                    this.obj = obj;
                    this.cb = cb;
                    this.handleEvent = function(e)
                    {
                        return this.cb.apply(this.obj, arguments);
                    }
                }(listener, handler);

            listener.eventHandlerHelpers[id] = helper;
        }
        obj.addEventListener(type, helper, useCapture);
    }
    else
    {
        if( ! helper )
        {
            helper = CallMember(listener, handler);
            listener.eventHandlerHelpers[id] = helper;
        }
        obj.attachEvent("on" + type, helper);
    }
}

/* +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++ */

function OnLoad()
{
    RegisterEventHandler(document.getElementById("codeValue"), "mouseup", this, OnTextChanged_Result, false);
    RegisterEventHandler(document.getElementById("codeValue"), "keyup", this, OnTextChanged_Result, false);
    RegisterEventHandler(document.getElementById("codeValue"), "change", this, OnTextChanged_Result, false);

    document.getElementById("codeValue").focus();
    OnTextChanged_Result();
}

/* +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++ */

window.onload = OnLoad;
